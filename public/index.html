<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Cat-Spirit MVP</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="bg-grid"></div>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">Cyber Cat-Spirit</p>
      <h1>赛博猫灵猫格具象化系统</h1>
      <p class="subtitle">10 题问卷 + 互动实验，评估猫咪猫格并生成猫格映射。</p>
    </header>

    <section class="panel">
      <h2>1) 猫格评估</h2>
      <form id="assessment-form">
        <div class="grid">
          <label>
            猫咪名称
            <input id="cat-name" type="text" value="Mocha" />
          </label>
        </div>

        <div class="block-title">初始定性：10 题问卷</div>
        <div id="questionnaire-list" class="qa-list"></div>

        <div class="block-title">动态修正：互动实验（至少做 1 项更准确）</div>
        <div id="experiment-list" class="qa-list"></div>

        <button type="submit">生成猫格映射</button>
      </form>
    </section>

    <section class="panel two-col">
      <div>
        <h2>2) 猫格雷达</h2>
        <svg id="radar" viewBox="0 0 420 360" role="img" aria-label="猫格雷达图"></svg>
        <div id="persona-image-dock" class="persona-image-dock" aria-live="polite"></div>
      </div>
      <div>
        <h2>3) 映射结果</h2>
        <article id="temperament-view" class="insight"></article>
      </div>
    </section>

    <section class="panel">
      <h2>4) 行为转译</h2>
      <form id="interpret-form">
        <div class="grid">
          <label>
            行为库动作
            <select id="action-select"></select>
          </label>
          <label>
            或自定义动作
            <input id="custom-action" type="text" placeholder="例如：突然盯着门缝低吼" />
          </label>
        </div>
        <div class="block-title">LLM 配置（可选，优先使用你当前填写的 Key）</div>
        <div class="llm-panel">
          <p class="helper-text">
            留空时使用服务器默认配置；填写后仅在当前浏览器会话内生效，不会写入服务器环境变量。
          </p>
          <div class="grid">
            <label>
              Provider
              <select id="llm-provider">
                <option value="openai">OpenAI</option>
                <option value="qwen">Qwen</option>
                <option value="custom">Custom Compatible</option>
              </select>
            </label>
            <label>
              API Interface
              <select id="llm-interface">
                <option value="responses">responses</option>
                <option value="chat_completions">chat_completions</option>
              </select>
            </label>
            <label>
              Model
              <input id="llm-model" type="text" value="gpt-4.1-mini" placeholder="例如：gpt-4.1-mini" />
            </label>
            <label>
              Base URL
              <input id="llm-base-url" type="url" value="https://api.openai.com/v1" placeholder="https://api.openai.com/v1" />
            </label>
          </div>
          <label>
            API Key
            <input id="llm-api-key" type="password" placeholder="仅保存在当前浏览器会话中" autocomplete="off" />
          </label>
          <p id="llm-config-hint" class="helper-text"></p>
        </div>
        <button type="submit">解释这个行为</button>
      </form>
      <article id="interpret-output" class="speech"></article>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>

</html>
